kind = "web"
previewPath = "/"
title = "NetworkVerse"
version = "1.0.0"
id = "artifacts/networkverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22003

[services.development]
run = "pnpm --filter @workspace/networkverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/networkverse", "run", "build" ]
publicDir = "artifacts/networkverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22003"
BASE_PATH = "/"
