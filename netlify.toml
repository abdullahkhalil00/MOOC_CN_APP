# Netlify config for NetworkVerse (main app)
[build]
  command = "pnpm --filter @workspace/networkverse run build"
  publish = "artifacts/networkverse/dist/public"

[build.environment]
  NODE_VERSION = "24"
  PORT = "22003"
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
